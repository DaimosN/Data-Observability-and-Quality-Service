version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dq_db
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data

  fastapi:
    build: ./fastapi
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://dq_user:dq_pass@postgres:5432/dq_db

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus  # Добавлен volume для хранения данных
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'  # Путь к хранилищу данных
      - '--storage.tsdb.retention.time=15d'  # Хранить данные 15 дней (опционально)
    user: root  # Для правильных прав доступа к volume

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana  # Добавлен volume для сохранения дашбордов и настроек
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel  # Опционально: плагин для круговых диаграмм
    depends_on:
      - prometheus
volumes:
  pg_data:
  prometheus_data:
  grafana_data: